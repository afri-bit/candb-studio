# Build, lint, unit tests + coverage, integration tests (VS Code + xvfb).
name: Build and test

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Use Node 24 for JS actions (avoids Node 20 deprecation on runners); see GitHub changelog 2025-09-19.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Lockfiles must be tracked in git for npm cache + npm ci.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix webview-ui

      - name: Lint
        run: npm run lint

      - name: Compile (webview + extension)
        run: npm run compile

      - name: Unit tests and coverage (extension sources)
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: node scripts/coverage-summary.cjs

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          if-no-files-found: warn
          path: coverage

      - name: Integration tests (VS Code extension host)
        uses: coactions/setup-xvfb@v1
        with:
          run: VSCODE_TEST_FILES='out/test/integration/**/*.test.js' npx vscode-test
